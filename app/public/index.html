<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Most Viewed Menu Items</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1rem; margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    input { padding: 6px 8px; margin-right: 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: #fff; }
    button.danger { background: #c0392b; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f5f5f5; }
    #message { margin-top: 10px; font-size: 0.85rem; color: #555; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Most Viewed Menu Items</h1>
  <p>Redis sorted set: <code>mostViewed:menuItems</code></p>

  <h2>Add Item</h2>
  <input id="addId" placeholder="Item ID (e.g. m001)" />
  <input id="addScore" type="number" placeholder="Initial views (default 0)" style="width:180px" />
  <button onclick="addItem()">Add</button>

  <h2>Increment Views</h2>
  <input id="incrId" placeholder="Item ID" />
  <input id="incrBy" type="number" placeholder="Increment (default 1)" style="width:160px" />
  <button onclick="incrementItem()">Increment</button>

  <h2>Delete Item</h2>
  <input id="delId" placeholder="Item ID" />
  <button class="danger" onclick="deleteItem()">Delete</button>
  <button class="danger" style="margin-left:10px" onclick="clearAll()">Clear All</button>

  <h2>All Items (ranked by views)</h2>
  <button onclick="loadItems()">Refresh</button>
  <table>
    <thead><tr><th>Rank</th><th>Item ID</th><th>Views</th></tr></thead>
    <tbody id="itemTable"></tbody>
  </table>

  <div id="message"></div>

  <script>
    const msg = (text) => document.getElementById('message').textContent = text;

    async function loadItems() {
      const res = await fetch('/items');
      const items = await res.json();
      const tbody = document.getElementById('itemTable');
      tbody.innerHTML = items.length
        ? items.map((item, i) => `<tr><td>#${i + 1}</td><td>${item.id}</td><td>${item.views}</td></tr>`).join('')
        : '<tr><td colspan="3">No items</td></tr>';
    }

    async function addItem() {
      const id = document.getElementById('addId').value.trim();
      const score = document.getElementById('addScore').value;
      if (!id) return msg('Item ID is required.');
      const res = await fetch('/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, score: score ? Number(score) : 0 })
      });
      const data = await res.json();
      msg(data.message || data.error);
      loadItems();
    }

    async function incrementItem() {
      const id = document.getElementById('incrId').value.trim();
      const increment = document.getElementById('incrBy').value;
      if (!id) return msg('Item ID is required.');
      const res = await fetch(`/items/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ increment: increment ? Number(increment) : 1 })
      });
      const data = await res.json();
      msg(data.error || `${id} now has ${data.views} views`);
      loadItems();
    }

    async function deleteItem() {
      const id = document.getElementById('delId').value.trim();
      if (!id) return msg('Item ID is required.');
      const res = await fetch(`/items/${id}`, { method: 'DELETE' });
      const data = await res.json();
      msg(data.message || data.error);
      loadItems();
    }

    async function clearAll() {
      if (!confirm('Clear all items?')) return;
      const res = await fetch('/items', { method: 'DELETE' });
      const data = await res.json();
      msg(data.message);
      loadItems();
    }

    loadItems();
  </script>
</body>
</html>
